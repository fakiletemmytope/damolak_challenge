name: Terraform + Deployment

on:
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/deploy.yaml"
      - "backend/**"
      - "frontend/**"
      - "docker-compose.yaml"

  workflow_dispatch:

env:
  EC2_USER: ubuntu   # change to ec2-user if using Amazon Linux

jobs:
  debug_aws_identity:
    runs-on: ubuntu-latest
    steps:
      - name: Debug AWS identity
        run: aws sts get-caller-identity
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}

  terraform:
    needs: debug_aws_identity
    runs-on: ubuntu-latest

    outputs:
      ec2_public_dns: ${{ steps.save.outputs.ec2_public_dns }}
      ec2_public_ip: ${{ steps.save.outputs.ec2_public_ip }}
      fqdn: ${{ steps.save.outputs.fqdn }}
      ssm_private_key_name: ${{ steps.save.outputs.ssm_private_key_name }}

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform Apply
        run: |
          terraform -chdir=terraform init
          terraform -chdir=terraform validate
          terraform -chdir=terraform plan -out=tfplan
          terraform -chdir=terraform apply -auto-approve tfplan

      - name: Save outputs
        id: save
        run: |
          echo "ec2_public_dns=$(terraform -chdir=terraform output -raw ec2_public_dns)" >> $GITHUB_OUTPUT
          echo "ec2_public_ip=$(terraform -chdir=terraform output -raw ec2_public_ip)" >> $GITHUB_OUTPUT
          echo "fqdn=$(terraform -chdir=terraform output -raw fqdn)" >> $GITHUB_OUTPUT
          echo "ssm_private_key_name=$(terraform -chdir=terraform output -raw ssm_private_key_name)" >> $GITHUB_OUTPUT

  deploy:
    needs: terraform
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Get private key from SSM
        run: |
          aws ssm get-parameter \
            --name "${{ needs.terraform.outputs.ssm_private_key_name }}" \
            --with-decryption \
            --query Parameter.Value \
            --output text > /tmp/key.pem

          chmod 600 /tmp/key.pem

      - name: Wait for SSH
        run: |
          for i in {1..30}; do
            if nc -z ${{ needs.terraform.outputs.ec2_public_dns }} 22; then
              echo "SSH is ready"
              exit 0
            fi
            echo "waiting... $i/30"
            sleep 10
          done
          exit 1

      - name: Test SSH
        run: |
          ssh -vvv \
            -i /tmp/key.pem \
            -o StrictHostKeyChecking=no \
            ${{ env.EC2_USER }}@${{ needs.terraform.outputs.ec2_public_dns }} exit

      - name: Wait for cloud-init
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ needs.terraform.outputs.ec2_public_dns }}
          username: ${{ env.EC2_USER }}
          key_path: /tmp/key.pem
          script: cloud-init status --wait

      - name: Create app directory
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ needs.terraform.outputs.ec2_public_dns }}
          username: ${{ env.EC2_USER }}
          key_path: /tmp/key.pem
          script: mkdir -p /home/${{ env.EC2_USER }}/damolak-app

      - name: Copy files
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ needs.terraform.outputs.ec2_public_dns }}
          username: ${{ env.EC2_USER }}
          key_path: /tmp/key.pem
          source: "./backend,./frontend,./docker-compose.yml"
          target: /home/${{ env.EC2_USER }}/damolak-app/

      - name: Create .env
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ needs.terraform.outputs.ec2_public_dns }}
          username: ${{ env.EC2_USER }}
          key_path: /tmp/key.pem
          script: |
            cat > /home/${{ env.EC2_USER }}/damolak-app/.env <<EOF
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            POSTGRES_DB=${{ secrets.POSTGRES_DB }}
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            DATABASE_URL=postgresql+asyncpg://${{ secrets.POSTGRES_USER }}:${{ secrets.POSTGRES_PASSWORD }}@db:5432/${{ secrets.POSTGRES_DB }}
            EOF

      - name: Deploy containers
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ needs.terraform.outputs.ec2_public_dns }}
          username: ${{ env.EC2_USER }}
          key_path: /tmp/key.pem
          script: |
            cd /home/${{ env.EC2_USER }}/damolak-app

            docker compose down || true
            docker system prune -f || true
            docker compose up -d --build

            sleep 30
            docker compose ps

      - name: Health check
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ needs.terraform.outputs.ec2_public_dns }}
          username: ${{ env.EC2_USER }}
          key_path: /tmp/key.pem
          script: |
            curl -f http://localhost || exit 1
            echo "Deployment successful: http://${{ needs.terraform.outputs.fqdn }}"

      - name: Cleanup key
        if: always()
        run: rm -f /tmp/key.pem